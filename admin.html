<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velunoo Admin — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-login-page">

  <div class="login-wrap">
    <div class="login-logo">
      <img src="brand_assets/Velunoo Logo.png" alt="Velunoo" style="height:48px;" />
    </div>
    <h1 class="login-title">Admin Login</h1>
    <p class="login-sub">Nur für autorisierte Mitarbeiter</p>

    <form class="login-form" id="loginForm">
      <div class="field-group">
        <label>E-Mail</label>
        <input type="email" id="loginEmail" placeholder="admin@velunoo.ch" required />
      </div>
      <div class="field-group">
        <label>Passwort</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />
      </div>
      <div class="login-error" id="loginError"></div>
      <button type="submit" class="btn-primary" id="loginBtn">Einloggen</button>
    </form>
  </div>

  <script>
    const API = 'https://velunoo-backend.onrender.com/api'

    // Bereits eingeloggt?
    if (localStorage.getItem('velunoo_admin_token')) {
      window.location.href = 'admin-dashboard.html'
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('loginBtn')
      const errorEl = document.getElementById('loginError')
      errorEl.textContent = ''
      btn.textContent = '...'
      btn.disabled = true

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Login fehlgeschlagen')
        localStorage.setItem('velunoo_admin_token', data.token)
        window.location.href = 'admin-dashboard.html'
      } catch (err) {
        errorEl.textContent = err.message
        btn.textContent = 'Einloggen'
        btn.disabled = false
      }
    })
  </script>
</body>
</html>
