<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velunoo Admin — Finanzen</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
  <aside class="sidebar"></aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>Finanzen</h1>
      <select id="periodSelect" class="period-select" onchange="loadPeriod()"></select>
    </div>

    <!-- Gewinn/Verlust Banner -->
    <div class="profit-banner" id="profitBanner">
      <div class="profit-left">
        <span class="profit-label">Gewinn / Verlust</span>
        <div class="profit-value" id="profitValue">CHF —</div>
        <span class="profit-sub" id="profitSub"></span>
      </div>
      <div class="profit-breakdown">
        <div class="breakdown-item">
          <span>Umsatz (Bestellungen)</span>
          <span id="bRevenue">CHF 0.00</span>
        </div>
        <div class="breakdown-item">
          <span>Manuelle Erträge</span>
          <span id="bManualErtrag">CHF 0.00</span>
        </div>
        <div class="breakdown-item">
          <span>Aufwände (Kosten)</span>
          <span id="bOpCost">− CHF 0.00</span>
        </div>
        <div class="breakdown-divider"></div>
        <div class="breakdown-item breakdown-total">
          <span>Nettogewinn</span>
          <span id="bProfit">CHF —</span>
        </div>
      </div>
    </div>

    <!-- Neuer Eintrag -->
    <div class="finance-card" style="margin-bottom:20px;">
      <h2 class="finance-card-title">➕ Neuer Eintrag</h2>
      <div class="form-grid form-grid-entry">
        <div class="field-group">
          <label>Datum</label>
          <input type="date" id="txDate" />
        </div>
        <div class="field-group">
          <label>Typ</label>
          <select id="txType" onchange="updateCategoryOptions()">
            <option value="aufwand">Aufwand (Kosten)</option>
            <option value="ertrag">Ertrag (Einnahme)</option>
          </select>
        </div>
        <div class="field-group">
          <label>Kategorie</label>
          <select id="txCategory"></select>
        </div>
        <div class="field-group">
          <label>Betrag (CHF)</label>
          <div class="chf-input">
            <span>CHF</span>
            <input type="number" id="txAmount" min="0" step="0.05" placeholder="0.00" />
          </div>
        </div>
      </div>
      <div class="field-group" style="margin-bottom:16px;">
        <label>Beschreibung / Notiz</label>
        <input type="text" id="txDesc" placeholder="z.B. TikTok Kampagne Frühlingsangebot" />
      </div>
      <div style="display:flex;justify-content:flex-end;">
        <button class="btn-primary" style="width:auto;padding:12px 32px;" onclick="addEntry()">
          Eintrag hinzufügen
        </button>
      </div>
    </div>

    <!-- Einträge dieser Periode -->
    <div class="finance-card">
      <h2 class="finance-card-title" id="entriesTitle">Einträge</h2>
      <div class="table-wrap" style="border-radius:10px;box-shadow:none;">
        <table class="admin-table" id="txTable">
          <thead>
            <tr>
              <th>Datum</th>
              <th>Typ</th>
              <th>Kategorie</th>
              <th>Beschreibung</th>
              <th>Betrag</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="txBody">
            <tr><td colspan="6" style="text-align:center;padding:24px;color:#888;">Noch keine Einträge für diesen Monat</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="admin-toast" id="adminToast"></div>

  <script src="admin.js"></script>
  <script>
    requireAuth()

    let currentRevenue = 0

    function buildPeriodSelect() {
      const sel = document.getElementById('periodSelect')
      const now = new Date()
      let opts = ''
      for (let i = 0; i < 24; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1)
        const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
        const label = d.toLocaleDateString('de-CH', { month: 'long', year: 'numeric' })
        opts += `<option value="${val}" ${i===0?'selected':''}>${label}</option>`
      }
      sel.innerHTML = opts
    }

    function updateCategoryOptions() {
      const type = document.getElementById('txType').value
      const cats = type === 'aufwand' ? AUFWAND_KATEGORIEN : ERTRAG_KATEGORIEN
      document.getElementById('txCategory').innerHTML =
        Object.entries(cats).map(([k,v]) => `<option value="${k}">${v}</option>`).join('')
    }

    function setTodayDate() {
      const today = new Date()
      document.getElementById('txDate').value =
        `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`
    }

    function getPeriod() {
      return document.getElementById('periodSelect').value
    }

    async function loadPeriod() {
      const period = getPeriod()
      const label = document.getElementById('periodSelect').selectedOptions[0]?.text || ''
      document.getElementById('entriesTitle').textContent = `Einträge — ${label}`

      // Bestellungs-Umsatz + Transaktionen laden
      try {
        const orders = await authFetch('/orders')
        currentRevenue = (orders || [])
          .filter(o => {
            const d = new Date(o.created_at)
            const p = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
            return o.status === 'paid' && p === period
          })
          .reduce((s, o) => s + parseFloat(o.total || 0), 0)
      } catch { currentRevenue = 0 }

      await loadAllTransactions()
      renderEntries()
      updateBanner()
    }

    function renderEntries() {
      const period = getPeriod()
      const txs = getTransactionsByPeriod(period)
        .sort((a, b) => b.date.localeCompare(a.date))

      const tbody = document.getElementById('txBody')
      if (txs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:#888;">Noch keine Einträge für diesen Monat</td></tr>'
        return
      }

      tbody.innerHTML = txs.map(t => {
        const catLabel = (AUFWAND_KATEGORIEN[t.category] || ERTRAG_KATEGORIEN[t.category] || t.category)
        const isAufwand = t.type === 'aufwand'
        return `
          <tr>
            <td>${t.date}</td>
            <td><span class="tx-badge ${isAufwand ? 'tx-aufwand' : 'tx-ertrag'}">${isAufwand ? 'Aufwand' : 'Ertrag'}</span></td>
            <td>${catLabel}</td>
            <td style="color:#555;">${t.description || '—'}</td>
            <td style="font-weight:700;color:${isAufwand ? '#e53e3e' : '#22c55e'};">
              ${isAufwand ? '−' : '+'} CHF ${parseFloat(t.amount).toFixed(2)}
            </td>
            <td>
              <button class="btn-icon btn-danger" onclick="removeEntry('${t.id}')">🗑️</button>
            </td>
          </tr>`
      }).join('')
    }

    function updateBanner() {
      const period = getPeriod()
      const kosten = getTotalKosten(period)
      const manualErtrag = getTotalErtrag(period)
      const total = currentRevenue + manualErtrag - kosten

      document.getElementById('bRevenue').textContent = `CHF ${currentRevenue.toFixed(2)}`
      document.getElementById('bManualErtrag').textContent = `CHF ${manualErtrag.toFixed(2)}`
      document.getElementById('bOpCost').textContent = `− CHF ${kosten.toFixed(2)}`

      const profitEl = document.getElementById('profitValue')
      const bProfitEl = document.getElementById('bProfit')
      const subEl = document.getElementById('profitSub')
      const banner = document.getElementById('profitBanner')
      const abs = `CHF ${Math.abs(total).toFixed(2)}`

      if (total >= 0) {
        profitEl.textContent = `+ ${abs}`
        profitEl.style.color = '#22c55e'
        bProfitEl.textContent = `+ ${abs}`
        bProfitEl.style.color = '#22c55e'
        subEl.textContent = 'Gewinn'
        subEl.style.color = '#22c55e'
        banner.style.borderColor = '#22c55e'
      } else {
        profitEl.textContent = `− ${abs}`
        profitEl.style.color = '#e53e3e'
        bProfitEl.textContent = `− ${abs}`
        bProfitEl.style.color = '#e53e3e'
        subEl.textContent = 'Verlust'
        subEl.style.color = '#e53e3e'
        banner.style.borderColor = '#e53e3e'
      }
    }

    async function addEntry() {
      const date = document.getElementById('txDate').value
      const type = document.getElementById('txType').value
      const category = document.getElementById('txCategory').value
      const amount = parseFloat(document.getElementById('txAmount').value)
      const description = document.getElementById('txDesc').value.trim()

      if (!date) { showAdminToast('Bitte Datum auswählen', true); return }
      if (!amount || amount <= 0) { showAdminToast('Bitte gültigen Betrag eingeben', true); return }

      await addTransaction({ date, type, category, amount, description })
      document.getElementById('txAmount').value = ''
      document.getElementById('txDesc').value = ''
      renderEntries()
      updateBanner()
      showAdminToast('Eintrag gespeichert ✅')
    }

    async function removeEntry(id) {
      if (!confirm('Eintrag löschen?')) return
      await deleteTransaction(id)
      renderEntries()
      updateBanner()
      showAdminToast('Eintrag gelöscht')
    }

    buildPeriodSelect()
    setTodayDate()
    updateCategoryOptions()
    loadPeriod()
  </script>
</body>
</html>
