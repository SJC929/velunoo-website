<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velunoo Admin — Produkte</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="brand_assets/Velunoo Logo.png" alt="Velunoo" style="height:36px;" />
    </div>
    <nav class="sidebar-nav">
      <a href="admin-dashboard.html" class="nav-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="admin-products.html" class="nav-item active">
        <span class="nav-icon">📦</span> Produkte
      </a>
      <a href="admin-orders.html" class="nav-item">
        <span class="nav-icon">🛒</span> Bestellungen
      </a>
      <a href="admin-newsletter.html" class="nav-item">
        <span class="nav-icon">📧</span> Newsletter
      </a>
    </nav>
    <button class="logout-btn" onclick="logout()">Ausloggen</button>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-header">
      <h1>Produkte</h1>
      <button class="btn-primary" onclick="openModal()">+ Neues Produkt</button>
    </div>

    <div class="table-wrap">
      <table class="admin-table" id="productsTable">
        <thead>
          <tr>
            <th>Bild</th>
            <th>Name (DE)</th>
            <th>Kategorie</th>
            <th>Preis</th>
            <th>Lager</th>
            <th>Aktionen</th>
          </tr>
        </thead>
        <tbody id="productsBody">
          <tr><td colspan="6" style="text-align:center;padding:32px;color:#888;">Lädt...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal: Produkt hinzufügen / bearbeiten -->
  <div class="modal-overlay" id="productModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Neues Produkt</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <form id="productForm" enctype="multipart/form-data">
        <input type="hidden" id="productId" />

        <div class="form-grid">
          <div class="field-group">
            <label>Name (Deutsch) *</label>
            <input type="text" id="name_de" required />
          </div>
          <div class="field-group">
            <label>Name (Englisch)</label>
            <input type="text" id="name_en" />
          </div>
          <div class="field-group">
            <label>Name (Französisch)</label>
            <input type="text" id="name_fr" />
          </div>
          <div class="field-group">
            <label>Name (Italienisch)</label>
            <input type="text" id="name_it" />
          </div>
        </div>

        <div class="form-grid">
          <div class="field-group">
            <label>Beschreibung (DE)</label>
            <textarea id="desc_de" rows="3"></textarea>
          </div>
          <div class="field-group">
            <label>Beschreibung (EN)</label>
            <textarea id="desc_en" rows="3"></textarea>
          </div>
        </div>

        <div class="form-grid form-grid-3">
          <div class="field-group">
            <label>Preis (CHF) *</label>
            <input type="number" id="price" step="0.05" min="0" required />
          </div>
          <div class="field-group">
            <label>Lagerbestand *</label>
            <input type="number" id="stock" min="0" required value="0" />
          </div>
          <div class="field-group">
            <label>Kategorie *</label>
            <select id="category" required>
              <option value="dog">Hund 🐕</option>
              <option value="cat">Katze 🐈</option>
              <option value="both">Beide 🐾</option>
            </select>
          </div>
        </div>

        <div class="field-group">
          <label>Produktbild</label>
          <div class="image-upload-area" id="imageUploadArea">
            <input type="file" id="productImage" accept="image/*" style="display:none;" onchange="previewImage(this)" />
            <div id="imagePreview" onclick="document.getElementById('productImage').click()">
              <span style="font-size:40px;">📷</span>
              <p>Bild hochladen (klicken)</p>
              <p style="font-size:12px;color:#aaa;">JPG, PNG, WEBP — max. 10MB</p>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeModal()">Abbrechen</button>
          <button type="submit" class="btn-primary" id="saveBtn">Speichern</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="admin-toast" id="adminToast"></div>

  <script src="admin.js"></script>
  <script>
    requireAuth()
    loadProducts()

    async function loadProducts() {
      try {
        const products = await authFetch('/products')
        const tbody = document.getElementById('productsBody')
        if (!products || products.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:#888;">Noch keine Produkte</td></tr>'
          return
        }
        tbody.innerHTML = products.map(p => `
          <tr>
            <td>
              ${p.product_images?.[0]?.url
                ? `<img src="${p.product_images[0].url}" style="width:52px;height:52px;object-fit:cover;border-radius:8px;">`
                : '<div style="width:52px;height:52px;background:#EAF4D6;border-radius:8px;"></div>'
              }
            </td>
            <td><strong>${p.name_de || '—'}</strong></td>
            <td><span class="cat-badge cat-${p.category}">${p.category === 'dog' ? '🐕 Hund' : p.category === 'cat' ? '🐈 Katze' : '🐾 Beide'}</span></td>
            <td>CHF ${parseFloat(p.price).toFixed(2)}</td>
            <td><span class="${p.stock === 0 ? 'stock-out' : 'stock-in'}">${p.stock}</span></td>
            <td>
              <button class="btn-icon" onclick='editProduct(${JSON.stringify(p)})'>✏️</button>
              <button class="btn-icon btn-danger" onclick="deleteProduct('${p.id}')">🗑️</button>
            </td>
          </tr>
        `).join('')
      } catch (e) {
        showAdminToast('Fehler beim Laden', true)
      }
    }

    function openModal(product = null) {
      document.getElementById('productForm').reset()
      document.getElementById('imagePreview').innerHTML = '<span style="font-size:40px;">📷</span><p>Bild hochladen (klicken)</p><p style="font-size:12px;color:#aaa;">JPG, PNG, WEBP — max. 10MB</p>'
      document.getElementById('imagePreview').onclick = () => document.getElementById('productImage').click()

      if (product) {
        document.getElementById('modalTitle').textContent = 'Produkt bearbeiten'
        document.getElementById('productId').value = product.id
        document.getElementById('name_de').value = product.name_de || ''
        document.getElementById('name_en').value = product.name_en || ''
        document.getElementById('name_fr').value = product.name_fr || ''
        document.getElementById('name_it').value = product.name_it || ''
        document.getElementById('desc_de').value = product.desc_de || ''
        document.getElementById('desc_en').value = product.desc_en || ''
        document.getElementById('price').value = product.price || ''
        document.getElementById('stock').value = product.stock ?? 0
        document.getElementById('category').value = product.category || 'dog'
        if (product.product_images?.[0]?.url) {
          document.getElementById('imagePreview').innerHTML = `<img src="${product.product_images[0].url}" style="max-height:160px;border-radius:8px;" />`
          document.getElementById('imagePreview').onclick = () => document.getElementById('productImage').click()
        }
      } else {
        document.getElementById('modalTitle').textContent = 'Neues Produkt'
        document.getElementById('productId').value = ''
      }
      document.getElementById('productModal').style.display = 'flex'
    }

    function editProduct(product) {
      openModal(product)
    }

    function closeModal() {
      document.getElementById('productModal').style.display = 'none'
    }

    function previewImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader()
        reader.onload = e => {
          document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}" style="max-height:160px;border-radius:8px;" />`
          document.getElementById('imagePreview').onclick = () => input.click()
        }
        reader.readAsDataURL(input.files[0])
      }
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = document.getElementById('saveBtn')
      btn.disabled = true

      try {
        const id = document.getElementById('productId').value
        const token = localStorage.getItem('velunoo_admin_token')

        // Step 1: Save product data as JSON
        btn.textContent = 'Speichert…'
        const payload = {
          name_de:  document.getElementById('name_de').value,
          name_en:  document.getElementById('name_en').value,
          name_fr:  document.getElementById('name_fr').value,
          name_it:  document.getElementById('name_it').value,
          desc_de:  document.getElementById('desc_de').value,
          desc_en:  document.getElementById('desc_en').value,
          price:    document.getElementById('price').value,
          stock:    document.getElementById('stock').value,
          category: document.getElementById('category').value
        }

        const res = await fetch(`${ADMIN_API}${id ? `/products/${id}` : '/products'}`, {
          method: id ? 'PUT' : 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        })

        if (!res.ok) {
          const err = await res.json().catch(() => ({}))
          throw new Error(err.error || 'Fehler beim Speichern')
        }

        const saved = await res.json()
        const productId = saved.id || id

        // Step 2: Upload image separately if a file was selected
        const imageFile = document.getElementById('productImage').files[0]
        if (imageFile && productId) {
          btn.textContent = 'Bild hochladen…'
          const imgForm = new FormData()
          imgForm.append('image', imageFile)

          const imgRes = await fetch(`${ADMIN_API}/products/${productId}/images`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: imgForm
          })

          if (!imgRes.ok) {
            showAdminToast('Produkt gespeichert, aber Bild-Upload fehlgeschlagen ⚠️', true)
            closeModal()
            loadProducts()
            return
          }
        }

        showAdminToast(id ? 'Produkt aktualisiert ✅' : 'Produkt hinzugefügt ✅')
        closeModal()
        loadProducts()
      } catch (err) {
        showAdminToast(err.message, true)
      } finally {
        btn.textContent = 'Speichern'
        btn.disabled = false
      }
    })

    async function deleteProduct(id) {
      if (!confirm('Produkt wirklich löschen?')) return
      try {
        const token = localStorage.getItem('velunoo_admin_token')
        await fetch(`${ADMIN_API}/products/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        })
        showAdminToast('Produkt gelöscht')
        loadProducts()
      } catch {
        showAdminToast('Fehler beim Löschen', true)
      }
    }

    // Schließen bei Klick außerhalb
    document.getElementById('productModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('productModal')) closeModal()
    })
  </script>
</body>
</html>
